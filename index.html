<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="monetag" content="26f74936b3211d17c713a0c181a76716">
    <title>DANA4D - Reward Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial;background:#f0f0f0;padding:20px;}
        .menu{display:flex;gap:10px;background:#0D8C4A;padding:12px 15px;justify-content:center;border-radius:50px;margin-bottom:20px;}
        .menu button{background:transparent;color:white;border:none;padding:8px 22px;border-radius:30px;font-size:15px;cursor:pointer;font-weight:bold;}
        .menu button i{margin-right:8px;}
        .menu button.active{background:#FFB800;color:black;}
        .page{display:none;max-width:450px;margin:0 auto;background:white;padding:25px;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;}
        .page.active-page{display:block;}
        .saldo-besar{font-size:46px;color:#0D8C4A;font-weight:bold;margin:15px 0;}
        .saldo-nominal{font-size:38px;color:#0D8C4A;font-weight:bold;margin:15px 0;}
        button.cta{background:#FFB800;padding:14px;border:none;border-radius:50px;font-size:16px;font-weight:bold;width:100%;cursor:pointer;margin:10px 0;}
        button.cta:disabled{background:#ccc;cursor:not-allowed;}
        .info-text{font-size:11px;color:#aaa;margin-top:10px;}
        .timer{font-size:12px;color:#FFB800;margin:8px 0;}
        .level{display:inline-block;background:#0D8C4A;color:white;padding:4px 15px;border-radius:20px;font-size:11px;margin-bottom:10px;}
        .ad-box{margin:15px 0;min-height:280px;background:#f9f9f9;border-radius:12px;border:1px solid #eee;overflow:hidden;}
        .ad-label{font-size:10px;color:#ccc;text-align:center;padding:4px;background:#f5f5f5;}
        input{width:90%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:50px;text-align:center;font-size:13px;}
        button.secondary{background:#e0e0e0;padding:10px 18px;border:none;border-radius:30px;cursor:pointer;margin:5px;}
        .btn-group{display:flex;gap:10px;justify-content:center;}
        .riwayat{background:#f0f0f0;padding:12px;border-radius:12px;margin-top:15px;max-height:150px;overflow-y:auto;text-align:left;}
        footer{text-align:center;margin-top:20px;font-size:10px;color:#aaa;}
        h2{font-size:20px;margin-bottom:5px;color:#333;}
        p{color:#666;font-size:13px;margin-bottom:15px;}
    </style>
</head>
<body>

<div class="menu">
    <button id="btnDashboard" class="active"><i class="fas fa-home"></i> Beranda</button>
    <button id="btnSaldo"><i class="fas fa-wallet"></i> Saldo</button>
    <button id="btnBagikan"><i class="fas fa-users"></i> Undang</button>
</div>

<div id="pageDashboard" class="page active-page">
    <div class="level" id="levelBadge">Bronze</div>
    <h2>Selamat Datang</h2>
    <div class="saldo-besar" id="dashboardSaldo">Rp0</div>
    <div class="ad-box">
        <div class="ad-label">Advertisement</div>
        <div data-zone="10892791" style="min-height:250px;"></div>
    </div>
    <div class="ad-box">
        <div class="ad-label">Advertisement</div>
        <div data-zone="10892764" style="min-height:250px;"></div>
    </div>
    <button class="cta" id="btnKlikIklan"><i class="fas fa-play"></i> Dapatkan Reward</button>
    <div id="timerDisplay" class="timer"></div>
    <div class="info-text"><i class="fas fa-info-circle"></i> Reward akan ditambahkan setelah melihat konten</div>
</div>

<div id="pageSaldo" class="page">
    <h2>Total Saldo</h2>
    <div class="saldo-nominal" id="saldoDisplay">Rp0</div>
    <div class="level" id="levelDisplay">Bronze</div>
    <div class="ad-box">
        <div class="ad-label">Advertisement</div>
        <div data-zone="10892791" style="min-height:250px;"></div>
    </div>
    <button class="cta" id="tarikBtn"><i class="fas fa-money-bill-wave"></i> Penarikan</button>
    <div class="info-text">Minimal penarikan Rp50.000</div>
</div>

<div id="pageBagikan" class="page">
    <h2>Undang Pengguna Baru</h2>
    <p>Dapatkan bonus untuk setiap pengguna baru</p>
    <input type="text" id="linkRef" readonly>
    <div class="btn-group">
        <button class="secondary" id="copyBtn"><i class="fas fa-copy"></i> Salin</button>
        <button class="secondary" id="bagikanWa"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    </div>
    <div class="riwayat">
        <strong>Daftar Referral</strong>
        <div id="daftarTeman">Belum ada</div>
    </div>
</div>

<footer>DANA4D Reward Center</footer>

<script async src="https://al5sm.com/tag.min.js" data-zone="10892791"></script>
<script async src="https://3nbf4.com/tag.min.js" data-zone="10892764"></script>

<script>
(function(){
    let s=parseInt(localStorage.getItem("b"))||0;
    function l(v){return v>=5e5?"Platinum":v>=2e5?"Gold":v>=75e3?"Silver":"Bronze";}
    function u(){
        document.getElementById("dashboardSaldo").innerText="Rp"+s.toLocaleString();
        document.getElementById("saldoDisplay").innerText="Rp"+s.toLocaleString();
        let lm=l(s);
        document.querySelectorAll(".level").forEach(el=>el.innerText=lm);
    }
    function st(v){s=v;localStorage.setItem("b",s);u();}
    u();
    let cd=parseInt(localStorage.getItem("cd"))||0;
    function ud(){
        let n=Date.now();
        if(n<cd){let r=Math.ceil((cd-n)/1000);document.getElementById("timerDisplay").innerHTML='⏱️ '+r+' detik';document.getElementById("btnKlikIklan").disabled=true;}
        else{document.getElementById("timerDisplay").innerHTML='';document.getElementById("btnKlikIklan").disabled=false;}
    }
    setInterval(ud,1000);ud();
    let sk=localStorage.getItem("sk")==="true";
    document.getElementById("btnKlikIklan").onclick=function(){
        if(Date.now()<cd){alert("Tunggu beberapa saat");return;}
        if(!sk){
            window.open("https://al5sm.com/click?zone=10892791","_blank");
            window.open("https://3nbf4.com/click?zone=10892764","_blank");
            localStorage.setItem("sk","true");
            alert("Buka konten, lalu klik tombol lagi");
        }else{
            let b=10000;
            if(s>=5e5)b=15000;else if(s>=2e5)b=13000;else if(s>=75e3)b=11000;
            st(s+b);
            localStorage.removeItem("sk");
            cd=Date.now()+6e4;
            localStorage.setItem("cd",cd);
            alert("+"+b.toLocaleString());
            ud();
        }
    };
    let stk=localStorage.getItem("stk")==="true";
    document.getElementById("tarikBtn").onclick=function(){
        if(s<5e4){alert("Minimal Rp50.000");return;}
        if(!stk){
            window.open("https://al5sm.com/click?zone=10892791","_blank");
            window.open("https://3nbf4.com/click?zone=10892764","_blank");
            localStorage.setItem("stk","true");
            alert("Proses penarikan");
        }else{
            localStorage.removeItem("stk");
            alert("Pengajuan penarikan Rp"+s.toLocaleString()+" sedang diproses");
        }
    };
    let uid=localStorage.getItem("uid");
    if(!uid){uid="U"+Math.random().toString(36).substring(2,8).toUpperCase();localStorage.setItem("uid",uid);}
    let url=window.location.origin+"/index.html?r="+uid;
    document.getElementById("linkRef").value=url;
    document.getElementById("copyBtn").onclick=function(){let l=document.getElementById("linkRef");l.select();document.execCommand("copy");alert("Tersalin");};
    document.getElementById("bagikanWa").onclick=function(){window.open("https://wa.me/?text=Reward Center - "+url,"_blank");};
    function sp(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));document.getElementById(id).classList.add('active-page');document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));if(id==='pageDashboard')document.getElementById('btnDashboard').classList.add('active');if(id==='pageSaldo')document.getElementById('btnSaldo').classList.add('active');if(id==='pageBagikan')document.getElementById('btnBagikan').classList.add('active');}
    document.getElementById('btnDashboard').onclick=()=>sp('pageDashboard');document.getElementById('btnSaldo').onclick=()=>sp('pageSaldo');document.getElementById('btnBagikan').onclick=()=>sp('pageBagikan');
    let rf=new URLSearchParams(window.location.search).get("r");
    if(rf&&rf!==uid){
        let skr=localStorage.getItem("skr")==="true";
        if(!skr){
            window.open("https://al5sm.com/click?zone=10892791","_blank");
            localStorage.setItem("skr","true");
            alert("Verifikasi");
        }else{
            let tm=JSON.parse(localStorage.getItem("tm"))||[];
            if(!tm.includes(rf)){tm.push(rf);localStorage.setItem("tm",JSON.stringify(tm));st(s+1e4);}
            localStorage.removeItem("skr");
            document.getElementById("daftarTeman").innerHTML=tm.map(t=>'<div>✅ '+t+'</div>').join('');
        }
    }
    let tl=JSON.parse(localStorage.getItem("tm"))||[];
    if(tl.length>0)document.getElementById("daftarTeman").innerHTML=tl.map(t=>'<div>✅ '+t+'</div>').join('');
})();
</script>
</body>
</html>
